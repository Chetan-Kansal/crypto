<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eavesdropper Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            overflow: hidden;
        }
        #cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }
        .container {
            position: relative;
            z-index: 1;
        }
        h1 {
            border-bottom: 2px solid #00ff41;
            padding-bottom: 10px;
            text-shadow: 0 0 10px #00ff41;
        }
        .warning {
            color: #ff0000;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .log-container {
            border: 1px solid #00ff41;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(5px);
            padding: 10px;
            height: 75vh;
            overflow-y: auto;
            word-break: break-all;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        .intercept {
            margin-bottom: 15px;
            border-bottom: 1px dashed #333;
            padding-bottom: 10px;
        }
        .meta {
            color: #ffcc00;
        }
    </style>
</head>
<body>
    <canvas id="cyber-bg"></canvas>
    <div class="container">
        <h1>📡 Eavesdropper / Attacker Dashboard</h1>
        <div class="warning">
            [WARNING] You have compromised the database and network layer.<br>
            Listening for encrypted AES-GCM payloads...
        </div>
        
        <div class="log-container" id="intercept-logs">
            <!-- Intercepts go here -->
        </div>
    </div>

    <script>
        const socket = io();
        const logs = document.getElementById('intercept-logs');
        
        socket.on('connect', () => {
            socket.emit('join_attacker');
            addLog("SYSTEM", "Connected to global attacker socket. Waiting for data...");
        });

        socket.on('attacker_intercept', (data) => {
            const div = document.createElement('div');
            div.className = 'intercept';
            
            const meta = document.createElement('div');
            meta.className = 'meta';
            meta.textContent = `[${new Date().toLocaleTimeString()}] Intercepted packet from ${data.sender} to User ID ${data.receiver_id}`;
            
            const payload = document.createElement('div');
            payload.textContent = `AES-GCM Ciphertext (Base64): ${data.ciphertext}`;
            
            div.appendChild(meta);
            div.appendChild(payload);
            logs.appendChild(div);
            
            logs.scrollTop = logs.scrollHeight;
        });

        function addLog(source, msg) {
            const div = document.createElement('div');
            div.className = 'intercept';
            div.innerHTML = `<span class="meta">[${new Date().toLocaleTimeString()}] ${source}</span><br>${msg}`;
            logs.appendChild(div);
        }

        // Three.js Red Cyberpunk Background (Attacker Theme)
        const canvas = document.getElementById('cyber-bg');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 700;
        const posArray = new Float32Array(particlesCount * 3);
        
        for(let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 10;
        }
        
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const material = new THREE.PointsMaterial({
            size: 0.02,
            color: 0xff0000, /* Red theme for attacker */
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });
        
        const particlesMesh = new THREE.Points(particlesGeometry, material);
        scene.add(particlesMesh);
        camera.position.z = 3;

        const animate = () => {
            requestAnimationFrame(animate);
            particlesMesh.rotation.y += 0.002; /* Spins faster */
            particlesMesh.rotation.x += 0.001;
            renderer.render(scene, camera);
        };
        animate();
    </script>
</body>
</html>
